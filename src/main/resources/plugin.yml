name: RealEstateClaims
main: com.stardev.realestateclaims.RealEstateClaims
version: 1.0.0
api-version: 1.26
depend:
  - Vault
commands:
  lcwand:
    description: Receive the land selection wand.
    permission: realestate.admin
  setnewlc:
    description: Create a new land claim using your current selection.
    permission: realestate.admin
  lcprice:
    description: Set a claim's purchase price.
    usage: /lcprice <id> <price>
    permission: realestate.admin
  lcdelete:
    description: Delete an existing claim.
    usage: /lcdelete <id>
    permission: realestate.admin
  lcinfo:
    description: Show claim information.
    usage: /lcinfo <id>
    permission: realestate.admin
  lcreload:
    description: Reload config and claim data.
    permission: realestate.admin
  lctrust:
    description: Trust a player inside your claim.
    usage: /lctrust <player>
    permission: realestate.command
  lcuntrust:
    description: Remove trusted access from a player.
    usage: /lcuntrust <player>
    permission: realestate.command
  lclist:
    description: List trusted players in your current claim.
    permission: realestate.command
  claiminfo:
    description: Show the claim you are standing in.
    permission: realestate.command
  myclaims:
    description: Open your owned claim list.
    permission: realestate.command
permissions:
  realestate.admin:
    description: Full administration access for RealEstateClaims.
    default: op
  realestate.command:
    description: Access RealEstateClaims basic claim commands.
    default: true
  realestate.bypass:
    description: Bypass protection and movement restrictions.
    default: op
